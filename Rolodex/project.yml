name: Rolodex
options:
  bundleIdPrefix: co.robwan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: "9F8FM27FQ5"
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  Rolodex:
    type: application
    platform: iOS
    sources:
      - path: Rolodex
        excludes:
          - "Info.plist"
    dependencies:
      - target: RolodexWidget
    info:
      path: Rolodex/Info.plist
      properties:
        CFBundleDisplayName: qard
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleDefault
        UIViewControllerBasedStatusBarAppearance: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryAddUsageDescription: "qard saves your branded wallpaper to Photos so you can set it as your lock screen."
        LSApplicationQueriesSchemes:
          - instagram
          - tiktok
          - twitter
          - linkedin
          - whatsapp
          - fb
          - snapchat
          - discord
          - tg
          - venmo
          - cashapp
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - rolodex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.robwan.Rolodex
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        CODE_SIGN_ENTITLEMENTS: Rolodex/Rolodex.entitlements

  RolodexWidget:
    type: app-extension
    platform: iOS
    sources:
      # Widget-only sources
      - path: RolodexWidget
      # Shared model + rendering layer (compiled into the extension separately)
      - path: Rolodex/Models/Card.swift
      - path: Rolodex/Models/Platform.swift
      - path: Rolodex/Models/PlatformStyle.swift
      - path: Rolodex/Theme/Fonts.swift
      - path: Rolodex/Views/Components/PlatformLogo.swift
      - path: Rolodex/Views/Components/QRCodeView.swift
      # Asset catalog — needed for platform logo images
      - path: Rolodex/Assets.xcassets
    info:
      path: RolodexWidget/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.robwan.Rolodex.Widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: RolodexWidget/RolodexWidget.entitlements
